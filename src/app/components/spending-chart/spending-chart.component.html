<!-- Chart surface -->
<div class="relative flex items-center justify-center group" [style.height.px]="size">
  <div class="relative w-full h-full">
    <canvas baseChart
      [data]="doughnutChartData"
      [options]="doughnutChartOptions"
      [type]="'doughnut'">
    </canvas>
  </div>

  <!-- Center label -->
  <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none gap-0.5">
    <span class="text-[9px] font-semibold text-zinc-400 uppercase tracking-widest">Outflow</span>
    <span class="text-xl font-bold text-zinc-900 dark:text-white tabular-nums">
      {{ totalSpending | currency:'INR':'symbol':'1.0-0' }}
    </span>
  </div>
</div>

<!-- Legend -->
<div class="grid grid-cols-2 sm:grid-cols-3 gap-1 mt-6 max-h-40 overflow-y-auto">
  <div *ngFor="let insight of insights"
    class="flex items-center gap-2.5 px-3 py-2 rounded-xl hover:bg-zinc-50 dark:hover:bg-white/5 transition-all duration-150 cursor-default">
    <span class="w-2 h-2 rounded-full shrink-0" [style.backgroundColor]="getCategoryColor(insight.category)"></span>
    <div class="flex flex-col min-w-0">
      <span class="text-[10px] font-semibold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide truncate">
        {{ insight.category }}
      </span>
      <span class="text-xs font-semibold text-zinc-900 dark:text-white">
        {{ (insight.amount / totalSpending * 100).toFixed(0) }}%
      </span>
    </div>
  </div>
</div>
