<div class="relative" [style.height.px]="height">
  <canvas baseChart
    [data]="lineChartData"
    [options]="lineChartOptions"
    [type]="'line'">
  </canvas>
</div>

<div *ngIf="!transactions.length" class="absolute inset-0 flex items-center justify-center bg-slate-800/10 backdrop-blur-[2px] rounded-xl">
  <div class="text-center">
    <div class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="bi bi-graph-up-arrow text-2xl text-blue-500"></i>
    </div>
    <p class="text-gray-400 font-medium">No trend data available yet</p>
    <p class="text-xs text-gray-500 mt-1">Add transactions to see your balance trend</p>
  </div>
</div>
