<div *ngIf="isOpen" 
     class="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4"
     (click)="onClose()">

  <div class="modal-card w-full max-w-sm bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-100 dark:border-white/10"
       (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header flex items-center justify-between px-6 pt-6 pb-4 border-b border-zinc-100 dark:border-white/10">
      <div>
        <h2 class="text-base font-bold text-zinc-900 dark:text-white">
          {{ transaction ? 'Edit Transaction' : 'New Transaction' }}
        </h2>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-0.5">
          {{ transactionForm.get('type')?.value === 'income' ? 'Recording income' : 'Recording expense' }}
        </p>
      </div>
      <button (click)="onClose()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-zinc-100 dark:hover:bg-white/10 transition-colors">
        <i class="bi bi-x-lg text-zinc-400 dark:text-zinc-500 text-sm"></i>
      </button>
    </div>

    <!-- Form Body -->
    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
      <div class="px-6 py-5 space-y-4">

        <!-- Type Toggle -->
        <div class="flex rounded-xl overflow-hidden border border-zinc-200 dark:border-white/10">
          <label class="flex-1 cursor-pointer" [ngClass]="transactionForm.get('type')?.value === 'income' ? 'bg-emerald-500' : 'bg-white dark:bg-zinc-800'">
            <input type="radio" formControlName="type" value="income" class="hidden">
            <div class="py-2 text-center text-xs font-semibold transition-colors"
                 [ngClass]="transactionForm.get('type')?.value === 'income' ? 'text-white' : 'text-zinc-500 dark:text-zinc-400'">
              ↑ Income
            </div>
          </label>
          <label class="flex-1 cursor-pointer border-l border-zinc-200 dark:border-white/10"
                 [ngClass]="transactionForm.get('type')?.value === 'expense' ? 'bg-rose-500' : 'bg-white dark:bg-zinc-800'">
            <input type="radio" formControlName="type" value="expense" class="hidden">
            <div class="py-2 text-center text-xs font-semibold transition-colors"
                 [ngClass]="transactionForm.get('type')?.value === 'expense' ? 'text-white' : 'text-zinc-500 dark:text-zinc-400'">
              ↓ Expense
            </div>
          </label>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">Description</label>
          <input type="text" formControlName="description"
                 placeholder="What was this for?"
                 class="w-full px-3 py-2.5 text-sm bg-zinc-50 dark:!bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-xl text-zinc-900 dark:text-zinc-100 placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-rose-500/30 focus:border-rose-500 transition-all">
        </div>

        <!-- Amount + Date Grid -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">Amount</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500 text-sm font-medium">₹</span>
              <input type="number" formControlName="amount"
                     placeholder="0.00"
                     class="w-full pl-7 pr-3 py-2.5 text-sm font-semibold bg-zinc-50 dark:!bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-xl text-zinc-900 dark:text-zinc-100 placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-rose-500/30 focus:border-rose-500 transition-all">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">Date</label>
            <input type="date" formControlName="date"
                   class="w-full px-3 py-2.5 text-sm bg-zinc-50 dark:!bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-xl text-zinc-900 dark:text-zinc-100 focus:outline-none focus:ring-2 focus:ring-rose-500/30 focus:border-rose-500 transition-all">
          </div>
        </div>

        <!-- Category -->
        <div>
          <label class="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">Category</label>
          <div class="relative">
            <button type="button" (click)="toggleDropdown()"
                    class="category-btn w-full px-3 py-2.5 text-sm text-left bg-zinc-50 dark:!bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-xl text-zinc-900 dark:text-zinc-100 focus:outline-none focus:ring-2 focus:ring-rose-500/30 focus:border-rose-500 transition-all flex items-center justify-between">
              <span [ngClass]="!transactionForm.get('category')?.value ? 'text-zinc-400 dark:text-zinc-600' : ''">
                {{ transactionForm.get('category')?.value || 'Select a category' }}
              </span>
              <i class="bi bi-chevron-down text-zinc-400 dark:text-zinc-500 text-xs transition-transform duration-200"
                 [class.rotate-180]="isDropdownOpen"></i>
            </button>

            <div *ngIf="isDropdownOpen"
                 class="category-dropdown absolute top-full left-0 right-0 mt-1 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-white/10 rounded-xl shadow-xl z-[70] overflow-hidden">
              <div class="max-h-44 overflow-y-auto py-1">
                <button *ngFor="let cat of categories" type="button"
                        (click)="selectCategory(cat)"
                        class="category-item w-full px-3 py-2 text-left text-sm transition-colors flex items-center justify-between"
                        [ngClass]="transactionForm.get('category')?.value === cat
                          ? 'text-rose-600 dark:text-rose-400 font-semibold bg-rose-50 dark:bg-rose-500/10'
                          : 'text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-white/5'">
                  {{ cat }}
                  <i *ngIf="transactionForm.get('category')?.value === cat" class="bi bi-check text-rose-600 dark:text-rose-400"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer px-6 pb-6 pt-4 flex gap-3 border-t border-zinc-100 dark:border-white/10">
        <button type="button" (click)="onClose()"
                class="cancel-btn flex-1 py-2.5 text-sm font-medium text-zinc-600 dark:text-zinc-400 bg-zinc-100 dark:bg-white/5 hover:bg-zinc-200 dark:hover:bg-white/10 rounded-xl transition-colors">
          Cancel
        </button>
        <button type="submit" [disabled]="transactionForm.invalid"
                class="flex-[2] py-2.5 text-sm font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-lg shadow-rose-600/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]">
          {{ transaction ? 'Save Changes' : 'Add Transaction' }}
        </button>
      </div>
    </form>

  </div>
</div>
