<div class="app-shell">
  <!-- Dynamic Sidebar -->
  <app-sidebar [currentRole]="currentRole" (roleChange)="onRoleChange($event)"></app-sidebar>

  <!-- Main Viewport Context -->
  <main class="main-content">
    <!-- Active Header (Context Actions & Global Search) -->
    <app-header [currentRole]="currentRole" (roleChange)="onRoleChange($event)"></app-header>
    
    <!-- Primary Dashboard Surface -->
    <div class="content-surface animate-in fade-in slide-in-from-bottom-4 duration-500">
      <app-dashboard [currentRole]="currentRole"></app-dashboard>
    </div>
  </main>

  <!-- Mobile Bottom Navigation (Rail Alternative) -->
  <nav class="md:hidden fixed bottom-1 left-0 right-0 z-50 px-4 pb-4">
    <div class="bg-zinc-950/80 backdrop-blur-xl border border-white/5 rounded-2xl p-2 flex items-center justify-around shadow-2xl">
      <button (click)="onMobileNavClick('dashboard')" 
              class="flex-1 flex flex-col items-center gap-1 py-1 transition-all duration-300"
              [class.text-rose-500]="activeSection === 'dashboard'"
              [class.text-zinc-500]="activeSection !== 'dashboard'">
        <i class="bi bi-grid-fill" [class.text-lg]="activeSection === 'dashboard'"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Dash</span>
      </button>
      <button (click)="onMobileNavClick('insights')" 
              class="flex-1 flex flex-col items-center gap-1 py-1 transition-all duration-300"
              [class.text-rose-500]="activeSection === 'insights'"
              [class.text-zinc-500]="activeSection !== 'insights'">
        <i class="bi bi-bar-chart-fill" [class.text-lg]="activeSection === 'insights'"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Insights</span>
      </button>
      <button (click)="onMobileNavClick('ledger')" 
              class="flex-1 flex flex-col items-center gap-1 py-1 transition-all duration-300"
              [class.text-rose-500]="activeSection === 'ledger'"
              [class.text-zinc-500]="activeSection !== 'ledger'">
        <i class="bi bi-list-ul" [class.text-lg]="activeSection === 'ledger'"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Audit</span>
      </button>
    </div>
  </nav>

  <app-toast></app-toast>
</div>
